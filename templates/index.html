<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Noise Dashboard |</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="fw-800 m-0">Neural <span style="color: var(--primary-glow)">Noise</span></h1>
                <p class="text-muted">Analisis Kebisingan Real-time via Backpropagation</p>
            </div>
            <div class="status-badge">
                <i class="fas fa-circle fa-xs me-2 animate-pulse"></i> AI Model Active
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="glass-card h-100">
                    <h5 class="mb-4"><i class="fas fa-sliders-h me-2"></i> Data Entry</h5>
                    <form id="noise-form">
                        <div class="mb-3">
                            <label class="small text-muted mb-2">SEQUENCE DATA (T-4 S/D T-0)</label>
                            <input type="number" step="0.1" name="noise_input[]" class="form-control form-control-custom mb-2" placeholder="Input 1 (dB)" required>
                            <input type="number" step="0.1" name="noise_input[]" class="form-control form-control-custom mb-2" placeholder="Input 2 (dB)" required>
                            <input type="number" step="0.1" name="noise_input[]" class="form-control form-control-custom mb-2" placeholder="Input 3 (dB)" required>
                            <input type="number" step="0.1" name="noise_input[]" class="form-control form-control-custom mb-2" placeholder="Input 4 (dB)" required>
                            <input type="number" step="0.1" name="noise_input[]" class="form-control form-control-custom mb-3" placeholder="Input 5 (dB)" required>
                        </div>
                        <button type="submit" class="btn btn-glow w-100 py-3">
                            <i class="fas fa-brain me-2"></i> Compute Prediction
                        </button>
                    </form>

                    <div id="output-section" class="mt-5 text-center d-none animate-fade-in">
                        <p class="small text-muted mb-0">ESTIMATED NOISE LEVEL</p>
                        <div id="prediction-result">--</div>
                        <p class="text-info small">Desibel (dB)</p>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="glass-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="m-0"><i class="fas fa-chart-line me-2"></i> Trend Analysis</h5>
                        <div id="error-msg" class="text-danger small"></div>
                    </div>
                    <div style="height: 400px;">
                        <canvas id="noiseChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Inisialisasi Chart.js dengan tema gelap
        const ctx = document.getElementById('noiseChart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['T-4', 'T-3', 'T-2', 'T-1', 'T-0', 'PREDICTION'],
                datasets: [{
                    label: 'Noise Level (dB)',
                    data: [],
                    borderColor: '#00d2ff',
                    backgroundColor: 'rgba(0, 210, 255, 0.1)',
                    borderWidth: 4,
                    pointRadius: 6,
                    pointBackgroundColor: '#fff',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        $('#noise-form').on('submit', function(e) {
            e.preventDefault();
            const inputs = $("input[name='noise_input[]']").map(function(){return parseFloat($(this).val());}).get();
            
            $.post('/predict', $(this).serialize(), function(data) {
                if(data.prediction) {
                    $('#output-section').removeClass('d-none');
                    $('#prediction-result').text(data.prediction);
                    
                    // Update Chart
                    chart.data.datasets[0].data = [...inputs, data.prediction];
                    // Beri warna berbeda pada titik terakhir (Prediksi)
                    chart.data.datasets[0].pointBackgroundColor = ['#fff', '#fff', '#fff', '#fff', '#fff', '#ff007f'];
                    chart.update();
                } else {
                    $('#error-msg').text(data.error);
                }
            });
        });
    </script>
</body>
</html>
